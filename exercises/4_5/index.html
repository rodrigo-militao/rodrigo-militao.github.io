<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width" />
    <title>Exercício 4.5</title>
    <style>
      div {
        border-color: black;
        border-style: solid;
      }
      .title {
        text-align: center;
      }

      .main-content {
        background-color: yellow;
      }

      .main-content .center-content {
        background-color: red;
        width: 50%;
        margin-left: auto;
        margin-right: auto;
      }

      .main-content .center-content p {
        font-style: italic;
      }

      .main-content .left-content {
        background-color: green;
        width: 60%;
        margin-left: 0;
        margin-right: auto;
      }

      .main-content .left-content .small-image {
        display: block;
        margin-left: auto;
        margin-right: auto;
        border-radius: 100%;
      }

      .main-content .right-content {
        background-color: blue;
        width: 60%;
        margin-left: auto;
        margin-right: 0;
      }

      .main-content .description {
        text-align: center;
      }
    </style>
  </head>
  <body>
    <script>
        let h1 = document.createElement('h1');
        h1.innerText = 'Exercício 4.5 - JavaScript DOM';
        document.body.appendChild(h1)

        let main = document.createElement('div');
        main.className = 'main-content';
        document.body.appendChild(main);

        let center = document.createElement('div');
        center.className = 'center-content';
        main.appendChild(center);

        let paragrafo = document.createElement('p');
        paragrafo.innerText = 'Passo 4 do exercício';
        center.appendChild(paragrafo);

        let left = document.createElement('div');
        left.className = 'left-content';
        main.appendChild(left);
        
        let right = document.createElement('div');
        right.className = 'right-content';
        main.appendChild(right);

        let imagem = document.createElement('img');
        imagem.src = 'https://picsum.photos/200';
        imagem.className = 'small-image';
        left.appendChild(imagem);

        let lista = document.createElement('ul');

        for (let i = 1; i <= 10; i++) {
            let li = document.createElement('li');
            li.innerText = i;
            lista.appendChild(li)
        }
        right.appendChild(lista);

        let tag1 = document.createElement('h3');
        tag1.innerText = 'Primeiro h3';
        main.appendChild(tag1);
        let tag2 = document.createElement('h3');
        tag2.innerText = 'Segundo h3';
        main.appendChild(tag2);
        let tag3 = document.createElement('h3');
        tag3.innerText = 'Terceiro h3';
        main.appendChild(tag3)





    </script>
  </body>
</html>
