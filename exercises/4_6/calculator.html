<!DOCTYPE html>
<html>
<head>
<meta charset=utf-8 />
<title>Calculator</title>
</head>
<body>

  <label>Square this number:
    <input type="number" id="square-input" size="2">
  </label>
  <button id="square-button">Calculate</button>
  <br><br>
  
  <label>Half this number:
    <input type="number" id="half-input" size="2">
  </label>
  <button id="half-button">Calculate</button>
  <br><br>
  
  <label>
    Fraction:
    <input type="number" id="percent1-input" size="2">
  </label>
  <label>
    Whole:
    <input type="number" id="percent2-input" size="2">
  </label>
  <button id="percent-button">Calculate</button>
  <br><br>
  
  <label>Calculate area of circle with radius:
    <input type="number" id="area-input" size="2">
  </label>
  <button id="area-button">Calculate</button> 
  <br><br>
  <div id="solution"></div>

  <script>
      const square_input = document.getElementById('square-input');
      const half_input = document.getElementById('half-input');
      const percent_input1 = document.getElementById('percent1-input');
      const percent_input2 = document.getElementById('percent2-input');
      const areacircle_input = document.getElementById('area-input');

      const square_button = document.getElementById('square-button');
      const half_button = document.getElementById('half-button');
      const percent_button = document.getElementById('percent-button');
      const area_button = document.getElementById('area-button');

    
      square_button.addEventListener('click', function(){
          solution.innerHTML = squareNumber(square_input.value);
      });

      half_button.addEventListener('click', function(){
        solution.innerHTML = halfOf(half_input.value);
        });

      percent_button.addEventListener('click', function(){
        solution.innerHTML = percentOf(percent_input1.value,percent_input2.value);
        });
      area_button.addEventListener('click', function(){
        solution.innerHTML = areaOfCircle(areacircle_input.value);
        });


function squareNumber(num) {
    var squaredNumber = num * num;
    console.log('The result of squaring the number ' + num + ' is ' + squaredNumber);
    return squaredNumber;
}

//squareNumber(3);

function halfOf(num) {
    var half = num / 2;
    console.log('Half of ' + num + ' is ' +  half);
    return half;
}

//halfOf(5);

function percentOf(num1, num2) {
    var percent = (num1/num2) * 100;
    console.log(num1 + ' is ' + percent + '% of ' + num2);
    return percent;
}

//percentOf(5, 10);

function areaOfCircle(radius) {
    var area = Math.PI * squareNumber(radius);
    console.log('The area of circle with radius ' + radius + ' is ' + area);
    return area;
}

//areaOfCircle(2);

function doCrazyStuff(num) {
    var half    = halfOf(num);
    var squared = squareNumber(half);
    var area    = areaOfCircle(squared);
    var result  = percentOf(squared, area);
}

doCrazyStuff(5);
  </script>
</body>
</html>
